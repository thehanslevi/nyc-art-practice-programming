name: Scan events

on:
  schedule:
    - cron: "0 12 * * 0"  # Sundays at 12:00 UTC (~7am ET / 8am ET DST)
  workflow_dispatch:      # allow manual runs from the Actions tab

concurrency:
  group: scan-events
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scanner
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Optional — email/newsletter pipeline. Leave unset to skip.
          IMAP_EMAIL: ${{ secrets.IMAP_EMAIL }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_FOLDER: ${{ secrets.IMAP_FOLDER }}
        run: npx tsx scripts/scan-events.ts
        timeout-minutes: 20

      - name: Commit changes
        run: |
          git config user.name  "calendar-scanner[bot]"
          git config user.email "calendar-scanner@users.noreply.github.com"
          git add src/data/events.json scripts/scanner/candidates-review.json scripts/scanner/last-run.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            SUMMARY=$(node -e "const s=require('./scripts/scanner/last-run.json'); console.log('accepted '+s.acceptedTotal+' · flagged '+s.rejectedTotal);")
            git commit -m "Auto-scan: $SUMMARY"
            # Handle race with concurrent pushes to main (up to 3 attempts)
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push $i failed; pulling and retrying..."
              git pull --rebase --autostash
            done
            echo "Could not push after 3 attempts."
            exit 1
          fi
